---
###############################################################################
# Feature Flags
###############################################################################

# 1. Create backup of existing config and database before install?
#
# Create a backup of existing configuration and database before performing any
# operations if /etc/opt/forgejo/app.ini is detected. This is executed before
# any data-modifying operations allowing for a manual recovery if needed. See
# forgejo_cfg_backup_opts.
#
# Default: True.
forgejo_flg_backup: true

# 2. Run maintenance tasks?
#
# Preform role maintenance tasks including removal of old role versions.
#
# Default: True.
forgejo_flg_maintenance: true

# 3. Install application?
#
# Creates required default directories, users, install packages, download
# software, autogenerates config.xml if not specified, update and start
# services.
#
# Default: True.
forgejo_flg_install: true

# 4. Set configuration data?
#
# Overwrite config data directory sourced from forgejo_cfg_d and app.ini from
# forgejo_cfg_file. Stops service, deploys user config data, updates and starts
# services.
#
# Default: False.
forgejo_flg_config: false

###############################################################################
# Service
###############################################################################

# Forgejo Release.
#
# Existing databases are migrated automatically when new versions are
# installed but may not support backward compatibility. Always read release
# notes before updating versions. Role is only developed for LTS releases.
#
# Versions (Schematic):
#       MAJOR: Unsafe - potentially new dependencies; only default MAJOR LTS
#              version is supported.
#       MINOR: Safe - New functionality may not be properly supported in
#              configuration.
#       PATCH: Safe - Usually requires no role updates.
#   RECOMMEND: Only increment MINOR.PATCH. Pre-releases unsupported.
#
# Default: 'v15.0.0'.
#
# Reference:
# * https://forgejo.org/releases
forgejo_srv_version: 'v15.0.0'

# Codeberg access token (forgejo).
#
# Unauthenticated (anonymous) API requests are heavily restricted to the sum
# total of requests to Codeberg from a given IP. Use an access token if
# receiving 403's.
#
# Codeberg:
#   * settings ➔ applications ➔ access tokens
#     * name: {LABEL APPROPRIATELY}
#     * Repository and Organization Access: Public only
#     * Select Permissions: repository (read-only)
#
# Default: '' (unauthenticated).
#
# Reference:
# * https://docs.codeberg.org/advanced/access-token
forgejo_srv_token: ''

# User that Forgejo will run under.
#
# 'git' will automatically be created using vars/main.yml if required.
# All other accounts are checked for existence.
#
# Default: 'git'.
forgejo_srv_user: 'git'

# Group that Forgejo will run under.
#
# 'git' will automatically be created using vars/main.yml if required.
# All other accounts are checked for existence.
#
# Default: 'git'.
forgejo_srv_group: 'git'

# Harden Forgejo service (exposure 2.3/10)?
#
# Restrict service to only required operations on system. Generally disabling
# this indicates a problem with underlying stack and not the role. See all
# hardening options in templates/systemd/override.conf.j2.
#
# Default: True.
forgejo_srv_harden: true

# yamllint disable rule:line-length
###############################################################################
# Config
###############################################################################
# Forgejo configuration is complex and nuanced. See Config Cheet Sheet and
# Example app.ini keeping in mind where the role places files.
#
# Forgejo uses jinja2 templating to parse app.ini and other files. Templates
# are automatically used when **forgejo_cfg_file** or **forgejo_cfg_d** are
# used.
#
# Use raw feature to allow jinja templating to pass through to rendered
# template:
#
# ``` ini
# [badges]
# GENERATOR_URL_TEMPLATE = {% raw %}'{{.label}}-{{.text}}'{% endraw %}
#
# ```
#
# Renders app.ini as:
# ``` ini
# [badges]
# GENERATOR_URL_TEMPLATE = '{{.label}}-{{.text}}'
# ```
#
# Reference:
# * https://forgejo.org/docs/latest/admin/config-cheat-sheet/
# * https://codeberg.org/forgejo/forgejo/src/branch/forgejo/custom/conf/app.example.ini
# yamllint enable rule:line-length

# Forgejo app.ini to set.
#
# Ansible controller path to source app.ini (treated as a jinja2 template
# allowing for ansible variable use).
#
# Sets /etc/opt/forgejo/app.ini. A default templates/app.ini.j2 config will be
# used if none is specified.
#
# A custom WORK_PATH is automatically detected with forgejo_cfg_file and
# service is updated accordingly. WORK_PATH outside of /var/opt/forgejo must be
# managed manually.
#
# forgejo_cfg_file: 'host_vars/forgejo.example.com/app.ini'
#
# Default: '' (use minimally configured default).
forgejo_cfg_file: ''

# Forgejo configuration to set.
#
# Ansible controller path to source directory (treated as a jinja2 templates
# allowing for ansible variable use).
#
# Sets data in /var/opt/forgejo/cfg/*. SQlite databases, certificates, etc.
# should be included. Files not sourced will be removed. /var/opt/forgejo
# typically contains service user home directory, where other non-configuration
# files may be stored (like logs, etc).
#
# Required default files (using a SQLite DB backend) are auto-generated if they
# do not exist.
#
# forgejo_flg_config=true:
# ⋮forgejo_cfg_d='' - Remove existing files.
# ⋮forgejo_cfg_d='{DIR}' - Replace existing files with sourced template
# ⋮    dir.
# forgejo_flg_config=false:
# ⋮forgejo_srv_conf_d=* - Take no action.
#
# forgejo_cfg_d: 'host_vars/forgejo.example.com/config'
#
# Default: '' (use minimally configured default).
forgejo_cfg_d: ''

# Manage local Forgejo users.
#
# Local users are managed via localhost HTTP API after Forgejo is configured.
#
# forgejo_cfg_users:
#     list of dict - User accounts to manage.
#   - username: str - Username.
#     password: str - Password.
#     email: str - Email.
#     admin: bool - Enable administrator privileges for account.
#         Default: False.
#     must_change_password: bool - Force password change on login.
#         Default: True.
#     restricted: bool - Enable restricted user account.
#         Default: False.
#     state: str - User state.
#         Values:
#           present: Create user.
#            absent: Delete user.
#         Default: 'present'.
#
# forgejo_cfg_users:
#   - username: 'admin_user'
#     password: 'admin'
#     email: 'admin@example.com'
#     admin: true
#   - username: 'standard_user'
#     password: 'sample'
#     email: 'user@example.com'
#     must_change_password: true
#   - username: 'old_admin'
#     state: 'absent'
#
# Default: [] (No local users).
forgejo_cfg_users: []

# Options to apply during backup operations.
#
# Backups are stored in {APP_DATA_PATH}/backup. Enabling all options will
# result in large backups.
#
# Valid Options:
#   * --database {sqlite3,mysql,postgres}
#   * --skip-repository
#   * --skip-log
#   * --skip-custom-dir
#   * --skip-lfs-data
#   * --skip-attachment-data
#   * --skip-package-data
#   * --skip-index
#   * --skip-repo-archives
#   * --type {zip,tar,tar.sz,tar.gz,tar.xz,tar.bz2,tar.br,tar.lz4,tar.zst}
#
# All other options are automatically determined via existing app.ini.
#
# forgejo_cfg_backup_opts:
#  - '--database sqlite3'
#  - '--skip-repository'
#  - '--skip-log'
#  - '--skip-custom-dir'
#  - '--skip-lfs-data'
#  - '--skip-attachment-data'
#  - '--skip-package-data'
#  - '--skip-index'
#  - '--skip-repo-archives'
#  - '--type tar.xz'
#
# Reference:
# * https://forgejo.org/docs/next/admin/command-line/#dump
forgejo_cfg_backup_opts: []
