---
###############################################################################
# Configure Services
###############################################################################
# Filetree returns a dict (instead of a list of dict) for one element. Use
# query to guarantee a list result.

- name:
    '{{ "Install | filesystem | set " ~ forgejo__cfg._app_ini }}'
  when: forgejo__cfg._file | length > 0
  ansible.builtin.template:
    src: '{{ forgejo__cfg._file }}'
    dest: '{{ forgejo__cfg._app_ini }}'
    owner: '{{ forgejo__srv._user }}'
    group: '{{ forgejo__srv._group }}'
    mode: '0640'

- name: 'Config | filetree | deploy managed files'
  ansible.builtin.template:
    src: '{{ item.src }}'
    dest: '{{ forgejo___app._work_d ~ "/" ~ item.path }}'
    owner: '{{ forgejo__srv._user }}'
    group: '{{ forgejo__srv._group }}'
    mode: '0640'
  loop: '{{ query("community.general.filetree", forgejo__cfg._d) }}'
  loop_control:
    label: '{{ item.path }}'
  when: item.state == 'file'
  register: forgejo__local

- name: 'Config | filesystem | query remote files'
  ansible.builtin.find:
    paths: '{{ forgejo___app._work_d }}'
    file_type: 'file'
    recurse: true
  register: forgejo__remote

- name: 'Config | filesystem | remove unmanaged files'
  ansible.builtin.file:
    path: '{{ item.path }}'
    state: 'absent'
  loop: '{{ forgejo__remote.files }}'
  loop_control:
    label: '{{ item.path }}'
  when: >
    item.path not in forgejo__local.results |
    selectattr('dest', 'defined') | map(attribute='dest') | list
