---
- name: 'Prep'
  ansible.builtin.include_tasks: 'prep.yml'

- name: 'Maintenance'
  when: forgejo_flg_maintenance
  ansible.builtin.import_tasks: 'maintenance.yml'

- name: 'Install'
  when: forgejo_flg_install
  ansible.builtin.include_tasks: 'install.yml'

- name: 'Config'
  when: forgejo_flg_config
  ansible.builtin.include_tasks: 'config.yml'

- name: 'Users'
  when: forgejo__cfg._users | length > 0
  ansible.builtin.include_tasks: 'users.yml'

- name: 'Start'
  ansible.builtin.include_tasks: 'start.yml'
