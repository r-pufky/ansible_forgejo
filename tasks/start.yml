---
###############################################################################
# Start
###############################################################################
# Start services and confirm they are active and running.

# Forgejo may have a long startup time if migration or new install.
- name: 'Start | systemd | forgejo'
  ansible.builtin.systemd:
    name: 'forgejo.service'
    state: 'started'
    enabled: true
    daemon_reload: true
  delay: 15
  retries: 3
  register: forgejo__service
  until: forgejo__service.status.ActiveState == 'active'

- name: 'Start | fact | query services'
  ansible.builtin.service_facts:

- name: 'Start | assert | services running'
  ansible.builtin.assert:
    quiet: true
    that: ansible_facts.services[item].state == 'running'
    fail_msg: |

      ✘ Service failed to start.
      {{ item }}
  loop:
    - 'forgejo.service'
